<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cash Flow | Průběžné výkaznictví</title>
<link rel="stylesheet" href="style.css">
<style>
  table { font-size: 12px; }
  th, td { padding: 3px 7px; }
  td.oz { width:6%; text-align:center; font-weight:600; color:var(--gold); white-space:nowrap; }
  td.cr { width:4%; text-align:center; color:var(--text-dim); font-size:11px; }
  td.tx { width:46%; }
  td.num { text-align:right; }
  tr.section-head td { background:rgba(0,0,0,.03) !important; font-weight:700; color:var(--gold); font-size:12px; }
  tr.zero td.num { color:var(--text-dim); }
  tr.bold td { font-weight:700; }
  tr.sub td.tx { padding-left:18px; color:var(--text-m); }
  tr.sep td { padding:2px; }
  .tis-note { font-size:11px; color:var(--text-m); margin-bottom:6px; }
  main { padding: 6px 12px 14px; }
  .section { padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; }
  .section h2 { font-size: 10px; margin-bottom: 7px; padding-bottom: 6px; }
  .header-top { padding: 5px 0 2px; }
  .nav-group { padding: 3px 16px 5px; gap: 3px; }
  .nav-lnk { padding: 3px 10px; font-size: 11px; }
  .nav-glbl { font-size: 8px; }
  .disclaimer { padding: 6px 12px; margin-bottom: 8px; font-size: 11px; }
  footer { padding: 8px; font-size: 11px; }
</style>
</head><body>
<header>
  <div class="header-top">
    <div class="logo">22<span>HLAV</span> &nbsp;|&nbsp; Přehled o peněžních tocích</div>
    <div class="header-meta" style="display:flex;align-items:center;gap:10px"><strong id="hdr-nazev">—</strong><span id="hdr-period"></span><span id="mode-badge"></span> · IČO: <span id="hdr-ico"></span></div>
  </div>
  <nav id="nav-links"></nav>
</header>
<main>
  <div id="loading">Načítám…</div><div id="err"></div>
  <div id="app" style="display:none">
    <div class="disclaimer" id="disclaimer" style="display:none"></div>
    <div class="section">
      <h2>Přehled o peněžních tocích — nepřímá metoda dle ČÚS 023, plný rozsah</h2>
      <p class="tis-note">Hodnoty v Kč</p>
      <div style="overflow-x:auto">
        <table id="cf-table"><thead id="cf-head"></thead><tbody id="cf-body"></tbody></table>
      </div>
    </div>
  </div>
</main>
<footer>Data jsou generována automatizovaným účetním procesem · 22HLAV · Průběžné výkaznictví v2.0</footer>
<script src="data/vsechna_obdobi_demo_sro.js"></script>
<script src="common.js"></script>
<script>
loadData(function(d){
  const allP = getModeAllP(d);
  const n = allP.length;
  const showDelta = n >= 2;
  const labels = allP.map(p => p.label || p.period_label);

  // Záhlaví tabulky
  document.getElementById("cf-head").innerHTML = `
    <tr>
      <th class="oz" rowspan="2">Ozn.</th>
      <th style="text-align:left" rowspan="2">TEXT</th>
      <th class="cr" rowspan="2">Č.ř.</th>
      <th colspan="${n}" style="text-align:center"></th>
      ${showDelta ? '<th rowspan="2">Δ %</th>' : ''}
    </tr>
    <tr>${labels.map(l => `<th style="font-size:11px">${l}</th>`).join('')}</tr>`;

  function v0(p, key) {
    if (p && p[key] !== undefined && p[key] !== null) return p[key];
    return 0;
  }

  function R(oz, txt, cr, key, opts) {
    opts = opts || {};
    const vals = allP.map(p => typeof key === 'function' ? key(p) : v0(p, key));
    const last = vals[vals.length - 1];
    const prev = vals.length >= 2 ? vals[vals.length - 2] : null;
    const allZero = vals.every(v => !v || v === 0);
    let cls = "";
    if (opts.sec) cls = "section-head";
    else if (opts.bold) cls = "bold";
    else if (opts.sub) cls = "sub";
    if (!opts.sec && !opts.bold && allZero) cls += " zero";

    let row = `<tr class="${cls}"><td class="oz">${oz}</td><td class="tx">${txt}</td><td class="cr">${cr}</td>`;
    vals.forEach(v => {
      row += `<td class="num">${kc(v, "0 Kč")}</td>`;
    });
    if (showDelta) {
      const dRel = (prev != null && prev !== 0) ? Math.round((last - prev) / Math.abs(prev) * 1000) / 10 : null;
      row += `<td class="num">${dRel == null ? "—" : (dRel >= 0 ? "+" : "") + dRel.toFixed(1) + "%"}</td>`;
    }
    return row + "</tr>";
  }

  const SEP = () => `<tr class="sep"><td colspan="${3 + n + (showDelta ? 1 : 0)}"></td></tr>`;
  const HEAD = txt => `<tr class="section-head"><td></td><td colspan="${2 + n + (showDelta ? 1 : 0)}">${txt}</td></tr>`;

  const rows = [];
  rows.push(R("P.", "Stav peněžních prostředků na začátku období", "01", "pp_zacatek", {bold:true}));
  rows.push(SEP());

  // Helper: A.1 součet všech nepeněžních úprav
  const sumA1 = p => v0(p,'cf_odpisy') + v0(p,'cf_zmena_rezerv')
       + (v0(p,'cf_nak_uroky') - v0(p,'cf_vyn_uroky'))
       + v0(p,'cf_uprava_prodej_sa');
  // Helper: A.2 součet změn pracovního kapitálu
  const sumA2 = p => v0(p,'cf_zmena_pohledavky') + v0(p,'cf_zmena_zasoby') + v0(p,'cf_zmena_zavazky')
       + v0(p,'cf_zmena_cr_pas') + v0(p,'cf_zmena_cr_akt');

  rows.push(HEAD("A. PENĚŽNÍ TOKY Z PROVOZNÍ ČINNOSTI"));
  rows.push(R("Z.", "Výsledek hospodaření před zdaněním", "02", "cf_vh_pred_zdanenim", {bold:true}));
  rows.push(R("A.1.", "Úpravy o nepeněžní operace", "03", sumA1, {bold:true}));
  rows.push(R("A.1.1.", "Odpisy stálých aktiv", "04", "cf_odpisy", {sub:true}));
  rows.push(R("A.1.2.", "Změna stavu rezerv", "05", "cf_zmena_rezerv", {sub:true}));
  rows.push(R("A.1.3.", "Nákladové − výnosové úroky", "06",
    p => v0(p,'cf_nak_uroky') - v0(p,'cf_vyn_uroky'), {sub:true}));
  rows.push(R("A.1.4.", "Úprava o zisk/ztrátu z prodeje stálých aktiv", "07", "cf_uprava_prodej_sa", {sub:true}));
  rows.push(R("A.*", "Čistý CF z provozní činnosti před zdaněním a změnami PK", "08",
    p => v0(p,'cf_vh_pred_zdanenim') + sumA1(p), {bold:true}));
  rows.push(R("A.2.", "Změny stavu nepeněžních složek pracovního kapitálu", "09", sumA2, {bold:true}));
  rows.push(R("A.2.1.", "Změna stavu pohledávek z provozní činnosti", "10", "cf_zmena_pohledavky", {sub:true}));
  rows.push(R("A.2.2.", "Změna stavu krátkodobých závazků z provozní činnosti", "11", "cf_zmena_zavazky", {sub:true}));
  rows.push(R("A.2.3.", "Změna stavu zásob", "12", "cf_zmena_zasoby", {sub:true}));
  rows.push(R("A.2.4.", "Změna časového rozlišení (aktiv + pasiv)", "13",
    p => v0(p,'cf_zmena_cr_pas') + v0(p,'cf_zmena_cr_akt'), {sub:true}));
  rows.push(R("A.**", "Čistý CF z provozní činnosti před zdaněním", "14",
    p => v0(p,'cf_vh_pred_zdanenim') + sumA1(p) + sumA2(p), {bold:true}));
  rows.push(R("A.6.", "Zaplacená daň z příjmů", "15", "cf_dan", {sub:true}));
  rows.push(R("A.***", "Čistý peněžní tok z provozní činnosti", "16", "cf_provozni", {bold:true}));
  rows.push(SEP());

  rows.push(HEAD("B. PENĚŽNÍ TOKY Z INVESTIČNÍ ČINNOSTI"));
  rows.push(R("B.1.", "Výdaje na pořízení stálých aktiv", "17", "cf_nabyte_dhm_dnm", {sub:true}));
  rows.push(R("B.2.", "Příjmy z prodeje stálých aktiv", "18", "cf_prodej_dm", {sub:true}));
  rows.push(R("B.***", "Čistý peněžní tok z investiční činnosti", "19", "cf_investicni", {bold:true}));
  rows.push(SEP());

  rows.push(HEAD("C. PENĚŽNÍ TOKY Z FINANČNÍ ČINNOSTI"));
  rows.push(R("C.1.", "Změna stavu dlouhodobých/krátkodobých závazků z fin. oblasti", "20", "cf_prijate_uvery", {sub:true}));
  rows.push(R("C.2.", "Dopady změn vlastního kapitálu na PP", "21", "cf_dividendy", {sub:true}));
  rows.push(R("C.***", "Čistý peněžní tok z finanční činnosti", "22", "cf_financni", {bold:true}));
  rows.push(SEP());

  rows.push(R("F.", "Čistá změna peněžních prostředků (A.*** + B.*** + C.***)", "23",
    p => v0(p,'cf_provozni') + v0(p,'cf_investicni') + v0(p,'cf_financni'),
    {bold:true}));
  rows.push(R("R.", "Stav peněžních prostředků na konci období (P. + F.)", "24",
    p => v0(p,'pp_konec_cf') || (v0(p,'pp_zacatek') + v0(p,'cf_provozni') + v0(p,'cf_investicni') + v0(p,'cf_financni')),
    {bold:true}));

  document.getElementById("cf-body").innerHTML = rows.join("");
});
</script>
</body></html>
