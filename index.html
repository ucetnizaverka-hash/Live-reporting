<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard | Živé výkaznictví</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head><body>
<header>
  <div class="header-top">
    <div class="logo">22<span>HLAV</span> &nbsp;|&nbsp; Živé výkaznictví</div>
    <div class="header-meta" style="display:flex;align-items:center;gap:10px"><strong id="hdr-nazev">—</strong><span id="hdr-period"></span><span id="mode-badge"></span> · IČO: <span id="hdr-ico"></span></div>
  </div>
  <nav id="nav-links"></nav>
  <div id="mode-toggle"></div>
</header>
<main>
  <div id="loading">Načítám…</div>
  <div id="err"></div>
  <div id="app" style="display:none">
    <div class="disclaimer" id="disclaimer" style="display:none"></div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="charts-2" id="charts"></div>
    <div class="section">
      <h2>Vývoj klíčových ukazatelů</h2>
      <table><thead id="trend-head"></thead><tbody id="trend-body"></tbody></table>
    </div>
    <div class="section" style="padding:14px 20px;display:flex;align-items:center;gap:16px">
      <a class="btn-gold" id="pdf-btn" href="#" target="_blank">⬇ Stáhnout PDF výkaz</a>
      <span style="font-size:12px;color:var(--gray)" id="updated"></span>
    </div>
  </div>
</main>
<footer><span>22HLAV</span> · Živé výkaznictví v2.0 · Data se aktualizují po každém zpracování</footer>
<script src="common.js"></script>
<script>
(function(){
  if(typeof window.getModeData!=="function"){
    window.getMode=function(){return location.hash.includes("rocni")?"rocni":"live";};
    window.getModeData=function(d){if(window.getMode()==="rocni"&&d.rocni&&Object.keys(d.rocni).length>0)return d.rocni;return d.aktualni;};
    window.getModeAllP=function(d){var cur=window.getModeData(d);return(d.periody||[]).concat([cur]).filter(function(p){return p&&Object.keys(p).length>0;});};
    window.hasRocni=function(d){return!!(d&&d.rocni&&Object.keys(d.rocni).length>0);};
    window.kc=function(v,z){if(v===null||v===undefined)return z||"";return Math.round(v).toLocaleString("cs-CZ")+" Kč";};
    window.delta=function(a,b){if(!b||b===0)return null;return Math.round((a-b)/Math.abs(b)*1000)/10;};
  }
})();
</script>
<script>
document.getElementById("pdf-btn").href = PDF_URL;

loadData(d => {
  const a = getModeData(d), s = d.sektor;
  const periody = d.periody || [];
  document.title = (d.nazev||"")+" | Dashboard";
  document.getElementById("updated").textContent = "Aktualizováno: "+(a.period_label||"")+" · "+(d.updated||"").slice(0,10);

  // KPI
  const prevP = periody[periody.length-1];
  const kpiData = [
    {lbl:"Tržby celkem", val:kc(a.trzby_celkem), delta: prevP?deltaHtml(a.trzby_celkem,prevP.trzby_celkem):""},
    {lbl:"VH za období", val:kc(a.vh_za_obdobi), delta: prevP?deltaHtml(a.vh_za_obdobi,prevP.vh_za_obdobi):""},
    {lbl:"EBITDA",       val:kc(a.ebitda),        delta: prevP?deltaHtml(a.ebitda,prevP.ebitda):""},
    {lbl:"Aktiva celkem",val:kc(a.aktiva_netto),  delta: prevP?deltaHtml(a.aktiva_netto,prevP.aktiva_netto):""},
    {lbl:"Peněžní prostředky",val:kc(a.pp),       sub:"CF provozní: "+kc(a.cf_provozni)},
    {lbl:"Altman Z-skóre", val:a.altman_z, extra: altmanBadge(a.altman_pasmo), cls:"navy"},
    {lbl:"Celk. zadluženost",val:pct(a.celkova_zadluzenost), sub:"Benchmark: "+pct(s.celkova_zadluzenost)},
    {lbl:"Běžná likvidita",  val:num(a.bezna_likvidita),     sub:"Benchmark: "+num(s.bezna_likvidita)},
  ];
  document.getElementById("kpi-grid").innerHTML = kpiData.map(k=>`
    <div class="kpi ${k.cls||''}">
      <div class="lbl">${k.lbl}</div>
      <div class="val">${k.val} ${k.extra||""}</div>
      ${k.delta?`<div>${k.delta}</div>`:""}
      ${k.sub?`<div class="sub">${k.sub}</div>`:""}
    </div>`).join("");

  // Charts – vsechny dostupne periody + aktualni
  const allP = getModeAllP(d);
  const labels = allP.map(p=>p.label||p.period_label);
  const trzby  = allP.map(p=>p.trzby_celkem||0);
  const vh     = allP.map(p=>p.vh_za_obdobi||0);
  const aktiva = allP.map(p=>p.aktiva_netto||0);
  const roa_d  = allP.map(p=>p.roa||0);

  const cw = document.getElementById("charts");
  cw.innerHTML = `
    <div class="chart-box"><h3>Tržby a VH (Kč)</h3><canvas id="ch1"></canvas></div>
    <div class="chart-box"><h3>Aktiva a ROA (%)</h3><canvas id="ch2"></canvas></div>`;

  new Chart(document.getElementById("ch1"),{type:"bar",data:{labels,datasets:[
    {label:"Tržby",data:trzby,backgroundColor:"rgba(27,36,105,.75)",borderRadius:4},
    {label:"VH",   data:vh,   backgroundColor:"rgba(212,149,42,.85)",borderRadius:4},
  ]},options:{responsive:true,maintainAspectRatio:true,
    plugins:{legend:{position:"bottom",labels:{font:{size:11}}}},
    scales:{y:{ticks:{callback:v=>(v/1000).toFixed(0)+" tis."}}}}});

  new Chart(document.getElementById("ch2"),{type:"bar",data:{labels,datasets:[
    {label:"Aktiva",data:aktiva,backgroundColor:"rgba(27,36,105,.6)",borderRadius:4,yAxisID:"y"},
    {label:"ROA %", data:roa_d, backgroundColor:"rgba(212,149,42,.9)",borderRadius:4,yAxisID:"y2",type:"line",tension:.3},
  ]},options:{responsive:true,maintainAspectRatio:true,
    plugins:{legend:{position:"bottom",labels:{font:{size:11}}}},
    scales:{y:{ticks:{callback:v=>(v/1000).toFixed(0)+" tis."}},
            y2:{position:"right",ticks:{callback:v=>v+"%"},grid:{drawOnChartArea:false}}}}});

  // Trend tabulka
  const cols = allP.map(p=>p.label);
  document.getElementById("trend-head").innerHTML =
    `<tr><th style="width:35%">Ukazatel</th>${cols.map(c=>`<th>${c}</th>`).join("")}</tr>`;
  const rows = [
    {lbl:"Tržby celkem",      key:"trzby_celkem",      fmt:kc},
    {lbl:"Provozní VH",       key:"provozni_vh",        fmt:kc},
    {lbl:"VH za období",      key:"vh_za_obdobi",       fmt:kc},
    {lbl:"EBITDA",            key:"ebitda",             fmt:kc},
    {lbl:"Aktiva celkem",     key:"aktiva_netto",       fmt:kc},
    {lbl:"ROA",               key:"roa",                fmt:pct},
    {lbl:"ROE",               key:"roe",                fmt:pct},
    {lbl:"ROS",               key:"ros",                fmt:pct},
    {lbl:"Běžná likvidita",   key:"bezna_likvidita",    fmt:num},
    {lbl:"Celk. zadluženost", key:"celkova_zadluzenost",fmt:pct},
    {lbl:"Altman Z",          key:"altman_z",           fmt:v=>v??"-"},
  ];
  document.getElementById("trend-body").innerHTML = rows.map(r=>{
    const vals = allP.map(p=>r.fmt(p[r.key]));
    return `<tr><td>${r.lbl}</td>${vals.map(v=>`<td>${v}</td>`).join("")}</tr>`;
  }).join("");
});
</script></body></html>
