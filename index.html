<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard | Průběžné výkaznictví</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
/* ===== STICKY TABS (dark) ===== */
.sticky-tabs {
  position:sticky; top:52px; z-index:100;
  display:flex; gap:0; overflow:hidden;
  background:rgba(10,16,50,.92); backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.1);
}
.sticky-tab {
  flex:1; padding:11px 20px; text-align:center; font-weight:600; font-size:12px;
  cursor:pointer; border:none; outline:none; transition:.2s; letter-spacing:.4px;
  color:#f0f4ff;
}
.sticky-tab.live  { background:rgba(212,149,42,.25); border-bottom:2px solid #D4952A; color:#fbbf24; }
.sticky-tab.hist  { background:rgba(27,36,105,.4);   border-bottom:2px solid #3b5bd9; color:#93c5fd; }
.sticky-tab.inactive { opacity:.4; border-bottom-color:transparent; }

/* ===== SEKCE ZÁHLAVÍ (dark) ===== */
.sec-header {
  display:flex; align-items:center; gap:14px;
  margin:28px 0 14px; padding:12px 20px; border-radius:8px;
  font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.7px;
}
.sec-header.live {
  background:rgba(212,149,42,.08); color:#fbbf24;
  border-left:4px solid #D4952A;
}
.sec-header.hist {
  background:rgba(27,36,105,.25); color:#93c5fd;
  border-left:4px solid #3b5bd9;
}
.sec-header .sec-pill {
  margin-left:auto; font-size:10px; font-weight:500; padding:3px 10px;
  border-radius:20px; text-transform:none; letter-spacing:0;
}
.sec-header.live .sec-pill { background:rgba(212,149,42,.2); color:#fbbf24; }
.sec-header.hist .sec-pill { background:rgba(59,91,217,.2);   color:#93c5fd; }

/* ===== ODDĚLOVAČ ===== */
.section-sep {
  margin:32px 0; height:2px;
  background:linear-gradient(90deg,rgba(27,36,105,.9) 0%,rgba(212,149,42,.7) 100%);
  border-radius:2px;
}

/* ===== HISTORICKÉ TABULKY (dark) ===== */
.ana-table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:16px; }
.ana-table th { background:rgba(255,255,255,.1); color:rgba(240,244,255,.6); padding:7px 10px; text-align:right; font-weight:600; border-bottom:1px solid rgba(255,255,255,.12); }
.ana-table th:first-child { text-align:left; }
.ana-table td { padding:6px 10px; border-bottom:1px solid rgba(255,255,255,.05); text-align:right; color:#f0f4ff; }
.ana-table td:first-child { text-align:left; font-weight:500; color:rgba(240,244,255,.8); }
.ana-table tr.grp td { background:rgba(255,255,255,.06); font-weight:700; color:#fbbf24; }
.ana-table tr:hover td { background:rgba(255,255,255,.04); }
.pos { color:#34d399; font-weight:600; }
.neg { color:#f87171; font-weight:600; }
.pct-cell { font-size:11px; color:rgba(240,244,255,.45); }

/* ===== UKAZATELE KARTY (dark) ===== */
.uk-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:16px; }
.uk-card { background:rgba(255,255,255,.07); border-radius:8px; padding:14px 16px;
  border:1px solid rgba(255,255,255,.1); border-top:3px solid rgba(255,255,255,.15); }
.uk-card.c23 { border-top-color:#6b7280; }
.uk-card.c24 { border-top-color:#D4952A; }
.uk-card .uk-rok { font-size:10px; color:rgba(240,244,255,.4); text-transform:uppercase; margin-bottom:5px; }
.uk-card .uk-val { font-size:19px; font-weight:700; color:#f0f4ff; }
.uk-card .uk-lbl { font-size:11px; color:rgba(240,244,255,.5); margin-top:2px; }

/* ===== CHARTS GRID ===== */
.charts-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:20px; }
@media(max-width:900px){ .charts-3{ grid-template-columns:1fr 1fr; } }
@media(max-width:600px){ .charts-3{ grid-template-columns:1fr; } }

/* ===== PROJEKCE BANNER (dark) ===== */
.proj-banner { background:rgba(212,149,42,.08); border:1px solid rgba(212,149,42,.25); border-radius:10px;
  padding:16px 20px; margin-bottom:20px; }
.proj-banner h3 { font-size:13px; font-weight:700; color:#fbbf24; margin:0 0 10px; }
.proj-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
.proj-item { text-align:center; }
.proj-item .pv { font-size:17px; font-weight:700; color:#f0f4ff; }
.proj-item .pl { font-size:11px; color:rgba(240,244,255,.5); }
</style>
</head><body>
<header>
  <div class="header-top">
    <div class="logo">22<span>HLAV</span> &nbsp;|&nbsp; Výkaznictví</div>
    <div class="header-meta" style="display:flex;align-items:center;gap:10px">
      <strong id="hdr-nazev">—</strong><span id="hdr-period"></span><span id="mode-badge"></span> · IČO: <span id="hdr-ico"></span>
    </div>
  </div>
  <nav id="nav-links"></nav>
  <div id="mode-toggle"></div>
</header>
<main>
  <div id="loading">Načítám…</div>
  <div id="err"></div>
  <div id="app" style="display:none">


    <!-- 
         SEKCE 1 — PRŮBĚŽNÉ VÝKAZNICTVÍ (zlatá)
     -->
    <div style="margin:20px 0 12px;font-size:13px;font-weight:700;color:var(--gold-lt);letter-spacing:.5px">PRŮBĚŽNÉ VÝKAZNICTVÍ &nbsp;<span id="live-period-pill" style="font-weight:500;color:var(--gray)"></span></div>

    <div class="disclaimer" id="disclaimer" style="display:none"></div>
    <div class="kpi-grid" id="kpi-grid"></div>
    <div class="charts-2" id="charts"></div>
    <div class="section">
      <h2>Vývoj klíčových ukazatelů</h2>
      <table><thead id="trend-head"></thead><tbody id="trend-body"></tbody></table>
    </div>
    <div class="section" style="padding:14px 20px;display:flex;align-items:center;gap:16px">
      <a class="btn-gold" id="pdf-btn" href="#" target="_blank">Stáhnout PDF výkaz</a>
      <span style="font-size:12px;color:var(--gray)" id="updated"></span>
    </div>



  </div><!-- #app -->
</main>
<footer><span>22HLAV</span> · Průběžné výkaznictví v2.0 </footer>
<script src="common.js"></script>
<script>
(function(){
  if(typeof window.getModeData!=="function"){
    window.getMode=function(){return location.hash.includes("rocni")?"rocni":"live";};
    window.getModeData=function(d){if(window.getMode()==="rocni"&&d.rocni&&Object.keys(d.rocni).length>0)return d.rocni;return d.aktualni;};
    window.getModeAllP=function(d){var cur=window.getModeData(d);return(d.periody||[]).concat([cur]).filter(function(p){return p&&Object.keys(p).length>0;});};
    window.hasRocni=function(d){return!!(d&&d.rocni&&Object.keys(d.rocni).length>0);};
    window.kc=function(v,z){if(v===null||v===undefined)return z||"";return Math.round(v).toLocaleString("cs-CZ")+" Kč";};
    window.delta=function(a,b){if(!b||b===0)return null;return Math.round((a-b)/Math.abs(b)*1000)/10;};
  }
})();

<script>
// ================================================================
// SEKCE 1: PRŮBĚŽNÉ VÝKAZNICTVÍ
// ================================================================
document.getElementById("pdf-btn").href = PDF_URL;

loadData(d => {
  const a = getModeData(d), s = d.sektor || {};
  const periody = d.periody || [];
  document.title = (d.nazev||"")+" | Dashboard";
  document.getElementById("updated").textContent = "Aktualizováno: "+(a.period_label||"")+" · "+(d.updated||"").slice(0,10);
  document.getElementById("live-period-pill").textContent = a.period_label || "";

  const prevP = periody[periody.length-1];
  const kpiData = [
    {lbl:"Tržby celkem",       val:kc(a.trzby_celkem),          delta:prevP?deltaHtml(a.trzby_celkem,prevP.trzby_celkem):""},
    {lbl:"VH za období",       val:kc(a.vh_za_obdobi),          delta:prevP?deltaHtml(a.vh_za_obdobi,prevP.vh_za_obdobi):""},
    {lbl:"EBITDA",             val:kc(a.ebitda),                delta:prevP?deltaHtml(a.ebitda,prevP.ebitda):""},
    {lbl:"Aktiva celkem",      val:kc(a.aktiva_netto),          delta:prevP?deltaHtml(a.aktiva_netto,prevP.aktiva_netto):""},
    {lbl:"Peněžní prostředky", val:kc(a.pp),                   sub:"CF provozní: "+kc(a.cf_provozni)},
    {lbl:"Altman Z-skóre",     val:a.altman_z,                 extra:altmanBadge(a.altman_pasmo), cls:"navy"},
    {lbl:"Celk. zadluženost",  val:pct(a.celkova_zadluzenost), sub:"Benchmark: "+pct(s.celkova_zadluzenost)},
    {lbl:"Běžná likvidita",    val:num(a.bezna_likvidita),      sub:"Benchmark: "+num(s.bezna_likvidita)},
  ];
  document.getElementById("kpi-grid").innerHTML = kpiData.map(k=>`
    <div class="kpi ${k.cls||''}">
      <div class="lbl">${k.lbl}</div>
      <div class="val">${k.val} ${k.extra||""}</div>
      ${k.delta?`<div>${k.delta}</div>`:""}
      ${k.sub?`<div class="sub">${k.sub}</div>`:""}
    </div>`).join("");

  const allP = getModeAllP(d);
  const labels = allP.map(p=>p.label||p.period_label);
  const cw = document.getElementById("charts");
  cw.innerHTML = `
    <div class="chart-box"><h3>Tržby a VH (Kč)</h3><div id="ch1" style="height:200px"></div></div>
    <div class="chart-box"><h3>Aktiva a ROA (%)</h3><div id="ch2" style="height:200px"></div></div>`;

  const PLY = {paper_bgcolor:'rgba(0,0,0,0)',plot_bgcolor:'rgba(0,0,0,0)',
    font:{color:'#f0f4ff',size:10,family:'Segoe UI,system-ui'},
    margin:{t:6,r:10,b:36,l:54},legend:{bgcolor:'rgba(0,0,0,0)',orientation:'h',y:-0.22,font:{size:10}},
    xaxis:{gridcolor:'rgba(255,255,255,.08)',tickfont:{size:10},automargin:true},
    yaxis:{gridcolor:'rgba(255,255,255,.08)',tickfont:{size:10}}};

  Plotly.newPlot("ch1",[
    {name:"Tržby",x:labels,y:allP.map(p=>Math.round((p.trzby_celkem||0)/1000)),type:"bar",
     marker:{color:allP.map((_,i)=>`rgba(45,74,158,${0.6+i*0.1})`),line:{width:0}},
     text:allP.map(p=>Math.round((p.trzby_celkem||0)/1000)+" tis."),textposition:"outside",textfont:{size:9}},
    {name:"VH",x:labels,y:allP.map(p=>Math.round((p.vh_za_obdobi||0)/1000)),type:"bar",
     marker:{color:allP.map((_,i)=>`rgba(212,149,42,${0.6+i*0.1})`),line:{width:0}},
     text:allP.map(p=>Math.round((p.vh_za_obdobi||0)/1000)+" tis."),textposition:"outside",textfont:{size:9}}
  ],{...PLY,yaxis:{...PLY.yaxis,ticksuffix:" tis.",title:{text:"tis. Kč",font:{size:9}}}},{responsive:true,displayModeBar:false});

  Plotly.newPlot("ch2",[
    {name:"Aktiva",x:labels,y:allP.map(p=>Math.round((p.aktiva_netto||0)/1000)),type:"bar",
     marker:{color:"rgba(45,74,158,.7)"},yaxis:"y"},
    {name:"ROA %",x:labels,y:allP.map(p=>p.roa||0),type:"scatter",mode:"lines+markers",
     line:{color:"#fbbf24",width:2},marker:{size:6,color:"#fbbf24"},yaxis:"y2"}
  ],{...PLY,yaxis:{...PLY.yaxis,ticksuffix:" tis.",title:{text:"tis. Kč",font:{size:9}}},
     yaxis2:{overlaying:"y",side:"right",gridcolor:"rgba(0,0,0,0)",ticksuffix:"%",tickfont:{size:9}}},
  {responsive:true,displayModeBar:false});

  const cols = allP.map(p=>p.label);
  document.getElementById("trend-head").innerHTML =
    `<tr><th style="width:35%">Ukazatel</th>${cols.map(c=>`<th>${c}</th>`).join("")}</tr>`;
  const trows = [
    {lbl:"Tržby celkem",      key:"trzby_celkem",       fmt:kc},
    {lbl:"Provozní VH",       key:"provozni_vh",         fmt:kc},
    {lbl:"VH za období",      key:"vh_za_obdobi",        fmt:kc},
    {lbl:"EBITDA",            key:"ebitda",              fmt:kc},
    {lbl:"Aktiva celkem",     key:"aktiva_netto",        fmt:kc},
    {lbl:"ROA",               key:"roa",                 fmt:pct},
    {lbl:"ROE",               key:"roe",                 fmt:pct},
    {lbl:"ROS",               key:"ros",                 fmt:pct},
    {lbl:"Běžná likvidita",   key:"bezna_likvidita",     fmt:num},
    {lbl:"Celk. zadluženost", key:"celkova_zadluzenost", fmt:pct},
    {lbl:"Altman Z",          key:"altman_z",            fmt:v=>v??"-"},
  ];
  document.getElementById("trend-body").innerHTML = trows.map(r=>{
    const vals = allP.map(p=>r.fmt(p[r.key]));
    return `<tr><td>${r.lbl}</td>${vals.map(v=>`<td>${v}</td>`).join("")}</tr>`;
  }).join("");
});
</script>

</body></html>
