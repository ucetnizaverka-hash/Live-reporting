<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Úvodní stránka | Průběžné výkaznictví</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.27.0/plotly.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'DM Sans','Segoe UI',system-ui,sans-serif;
  --blue:#2a5cff;--blue-glow:#4a8cff;
  --gold:#D4952A;--gold-lt:#f59e0b;
  --card-bg:rgba(255,255,255,0.95);--card-border:rgba(0,0,0,0.08);
  --card-shadow:0 2px 16px rgba(0,0,0,.10),0 1px 4px rgba(0,0,0,.06);
  --card-shadow-hover:0 16px 48px rgba(0,0,0,.20),0 4px 16px rgba(0,0,0,.10);
  --text-d:#111827;--text-m:#6b7280;--text-dim:#9ca3af;
  --green:#16a34a;--red:#dc2626;--sep:rgba(0,0,0,0.08);
  --bg-text:rgba(240,244,255,.75);--bg-text-dim:rgba(160,185,255,.55);
}
html,body{font-family:var(--font);color:var(--text-d);background:#010a2a;min-height:100vh;overflow-x:hidden}

/* ─── BACKGROUND ─── */
.bg-stage{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(145deg,#010a2a 0%,#031050 30%,#061880 55%,#041260 75%,#020930 100%);overflow:hidden}
.bg-lines{position:absolute;inset:0;
  background-image:repeating-linear-gradient(62deg,transparent,transparent 5px,rgba(80,120,255,.05) 5px,rgba(80,120,255,.05) 6px)}
.orb{position:absolute;border-radius:50%;filter:blur(90px);mix-blend-mode:screen;animation:orbFloat linear infinite}
.orb-1{width:700px;height:420px;top:-80px;left:-120px;background:radial-gradient(ellipse,rgba(40,80,220,.45) 0%,transparent 70%);animation-duration:24s}
.orb-2{width:600px;height:380px;bottom:-80px;right:-80px;background:radial-gradient(ellipse,rgba(30,60,200,.40) 0%,transparent 70%);animation-duration:30s;animation-delay:-10s}
.orb-3{width:350px;height:350px;top:38%;left:38%;background:radial-gradient(ellipse,rgba(60,100,255,.20) 0%,transparent 70%);animation-duration:20s;animation-delay:-5s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.04)}50%{transform:translate(14px,40px) scale(.96)}75%{transform:translate(-22px,14px) scale(1.02)}100%{transform:translate(0,0) scale(1)}}
.bg-waves{position:absolute;inset:0;width:100%;height:100%}
.wave-g-1{animation:wd1 18s ease-in-out infinite}.wave-g-2{animation:wd2 22s ease-in-out infinite}
@keyframes wd1{0%,100%{transform:translateY(0)}50%{transform:translateY(18px)}}
@keyframes wd2{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}

/* ─── LAYOUT ─── */
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ─── NAV ─── */
.nav{display:grid;grid-template-columns:auto 1fr minmax(0,auto);align-items:center;
  gap:12px;padding:8px 20px;
  border-bottom:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(24px) saturate(180%);background:rgba(1,10,42,.72);
  position:sticky;top:0;z-index:200}
.nav-brand{display:flex;align-items:center;gap:12px;white-space:nowrap}
.nav-logo{width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--blue-glow));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;box-shadow:0 0 18px rgba(42,92,255,.5)}
.nav-brand-name{font-size:14px;font-weight:600;color:#fff;letter-spacing:.4px}
.nav-brand-sub{font-size:10px;color:var(--bg-text-dim);margin-top:1px;letter-spacing:.3px}
.nav-center{display:flex;align-items:center;justify-content:center;gap:8px;min-width:0}
.nav-client-name{font-size:13px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sep{color:var(--bg-text-dim);font-size:12px}
.nav-period{font-size:12px;color:var(--bg-text);white-space:nowrap}
.nav-ico-txt{font-size:11px;color:var(--bg-text-dim);white-space:nowrap}
.nav-right{display:flex;align-items:center;gap:3px;justify-content:flex-end}
.nav-tab{padding:6px 12px;border-radius:14px;font-size:11px;font-weight:500;
  color:var(--bg-text);cursor:pointer;transition:.2s;border:1px solid transparent;
  background:none;text-decoration:none;display:inline-block;white-space:nowrap}
.nav-tab:hover{color:#fff;background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.15)}
.nav-tab.active{color:#fff;background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.2);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}

/* ─── MAIN ─── */
main{max-width:1260px;margin:0 auto;padding:0 24px 60px;width:100%}

/* ─── HERO — kompaktní s gradient textem ─── */
.hero{padding:20px 0 12px;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.hero-left{flex:1;min-width:200px}
.hero-eyebrow{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--blue-glow);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22d3ee;
  box-shadow:0 0 10px #22d3ee,0 0 20px rgba(34,211,238,.4);animation:lp 2s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.75)}}
.hero-title{font-size:23px;font-weight:300;line-height:1.2;color:#f0f4ff}
.hero-title strong{font-weight:700;
  background:linear-gradient(95deg,#fff 0%,#93c5fd 40%,var(--gold-lt) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-meta{margin-top:5px;font-size:11px;color:var(--bg-text-dim);font-weight:300}

/* Hero číselné boxy vpravo */
.hero-kpi-row{display:flex;gap:1px;align-items:stretch;border-radius:14px;overflow:hidden;
  border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);flex-shrink:0}
.hkp{padding:10px 18px;text-align:center;position:relative}
.hkp+.hkp::before{content:"";position:absolute;left:0;top:25%;height:50%;width:1px;background:rgba(255,255,255,.12)}
.hkp .hk-val{font-size:16px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums lining-nums;white-space:nowrap}
.hkp .hk-lbl{font-size:9px;color:var(--bg-text-dim);letter-spacing:.8px;text-transform:uppercase;margin-top:2px}

/* ─── SEC DIVIDER ─── */
.sec-div{display:flex;align-items:center;gap:14px;margin:14px 0 10px}
.sec-div h2{font-size:9.5px;font-weight:600;letter-spacing:2.2px;text-transform:uppercase;white-space:nowrap}
.sec-div.gold h2{color:var(--gold-lt)}.sec-div.blue h2{color:#93c5fd}
.sec-div-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.2),transparent)}
.sec-div-pill{font-size:9.5px;padding:2px 10px;border-radius:20px;font-weight:400}
.sec-div.gold .sec-div-pill{background:rgba(212,149,42,.12);color:var(--gold-lt);border:1px solid rgba(212,149,42,.25)}
.sec-div.blue .sec-div-pill{background:rgba(59,91,217,.12);color:#93c5fd;border:1px solid rgba(59,91,217,.25)}

/* ─── KPI GRID — 4 sloupce ─── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:10px}
.kpi{background:var(--card-bg);border:1px solid var(--card-border);border-radius:13px;
  border-left:3px solid var(--gold);
  box-shadow:var(--card-shadow);padding:13px 15px;
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .25s;position:relative;overflow:hidden}
.kpi::after{content:"";position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.0) 0%,rgba(255,255,255,.05) 100%);pointer-events:none}
.kpi:hover{transform:translateY(-3px) scale(1.018);box-shadow:var(--card-shadow-hover);z-index:10}
.kpi.navy{border-left-color:var(--blue)}
.kpi.teal{border-left-color:#0ea5e9}
.kpi.violet{border-left-color:#7c3aed}
.kpi .lbl{font-size:9px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-m);margin-bottom:5px}
.kpi .val{font-size:17px;font-weight:700;color:var(--text-d);font-variant-numeric:tabular-nums lining-nums;line-height:1.1}
.kpi .sub{font-size:9.5px;color:var(--text-dim);margin-top:3px}
.kpi .delta{font-size:9.5px;font-weight:600;margin-top:3px}
.delta.up{color:var(--green)}.delta.down{color:var(--red)}

/* ─── CHARTS 2 sloupce ─── */
.charts-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.chart-box{background:var(--card-bg);border:1px solid rgba(255,255,255,.7);border-radius:13px;
  padding:13px 15px;box-shadow:var(--card-shadow);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
.chart-box:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover);z-index:10}
.chart-box h3{font-size:9px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:var(--text-m);margin-bottom:7px}

/* ─── SECTION ─── */
.section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:13px;
  padding:14px 18px;margin-bottom:10px;box-shadow:var(--card-shadow);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .25s}
.section:hover{transform:scale(1.002);box-shadow:var(--card-shadow-hover)}
.section h2{font-size:9.5px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;
  color:var(--text-m);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--sep)}

/* ─── TABLES ─── */
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--text-m);
  background:rgba(0,0,0,.03);padding:6px 10px;text-align:right;font-weight:600;
  border-bottom:1px solid var(--sep)}
th:first-child{text-align:left}
td{padding:5.5px 10px;border-bottom:1px solid rgba(0,0,0,.05);text-align:right;
  color:var(--text-d);font-family:var(--font);
  font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum" 1,"lnum" 1}
td:first-child{text-align:left;font-variant-numeric:normal;font-feature-settings:normal}
tr:hover td{background:rgba(0,0,0,.02)}
tr.bold td{font-weight:700;background:rgba(0,0,0,.03) !important}
tr.total td{font-weight:700;color:#92400e;border-top:1px solid rgba(212,149,42,.4);background:rgba(212,149,42,.06) !important}
tr.sub td:first-child{padding-left:20px;color:var(--text-m)}
tr.sub2 td:first-child{padding-left:34px;color:var(--text-dim);font-size:11px}
tr.sep td{padding:1px;background:transparent !important;border:none}
td.neg{color:var(--red);font-weight:600}td.pos{color:var(--green);font-weight:600}
td.gray{color:var(--text-dim);font-size:11px}td.note{color:var(--text-dim);font-style:italic;font-size:10px}

/* ─── ANA TABLE ─── */
.ana-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.ana-table th{background:rgba(0,0,0,.04);color:var(--text-m);padding:6px 9px;text-align:right;
  font-weight:600;border-bottom:1px solid var(--sep);font-size:9px;letter-spacing:.4px;text-transform:uppercase}
.ana-table th:first-child{text-align:left}
.ana-table td{padding:5px 9px;border-bottom:1px solid rgba(0,0,0,.04);text-align:right;color:var(--text-d);
  font-family:var(--font);font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum" 1,"lnum" 1}
.ana-table td:first-child{text-align:left;font-variant-numeric:normal;font-feature-settings:normal;font-weight:500;color:#374151}
.ana-table tr.grp td{background:rgba(0,0,0,.04);font-weight:700;color:#1a2035}
.ana-table tr:hover td{background:rgba(0,0,0,.02)}
.pos{color:var(--green);font-weight:600}.neg{color:var(--red);font-weight:600}
.pct-cell{font-size:10px;color:var(--text-dim)}

/* ─── UK CARDS ─── */
.uk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:9px;margin-bottom:12px}
.uk-card{background:var(--card-bg);border-radius:11px;padding:11px 13px;
  border:1px solid var(--card-border);border-top:3px solid var(--card-border);box-shadow:var(--card-shadow)}
.uk-card.c23{border-top-color:#6b7280}.uk-card.c24{border-top-color:var(--gold)}
.uk-card .uk-rok{font-size:9px;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px}
.uk-card .uk-val{font-size:17px;font-weight:700;color:var(--text-d);font-variant-numeric:tabular-nums lining-nums}
.uk-card .uk-lbl{font-size:10px;color:var(--text-m);margin-top:2px}

/* ─── BADGE ─── */
.badge{display:inline-block;padding:1px 7px;border-radius:7px;font-weight:700;font-size:10px}
.badge.green{background:rgba(22,163,74,.12);color:var(--green)}
.badge.yellow{background:rgba(245,158,11,.12);color:#92400e}
.badge.red{background:rgba(220,38,38,.12);color:var(--red)}

/* ─── DISCLAIMER ─── */
.disclaimer{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:9px;
  padding:7px 13px;font-size:11px;color:#92400e;margin-bottom:9px}

/* ─── HIST NOTE ─── */
.hist-note{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:8px;
  padding:7px 13px;font-size:11px;color:#1e40af;margin-bottom:10px}
.vert-note{font-size:10px;color:var(--text-dim);margin-top:4px;font-style:italic}

/* ─── BUTTONS ─── */
.btn-gold{display:inline-block;background:rgba(212,149,42,.15);border:1px solid rgba(212,149,42,.35);
  color:#92400e;padding:7px 16px;border-radius:12px;font-weight:600;font-size:11.5px;
  text-decoration:none;transition:background .15s;box-shadow:0 2px 8px rgba(212,149,42,.12)}
.btn-gold:hover{background:rgba(212,149,42,.25)}

/* ─── FOOTER ─── */
.footer{padding:11px 24px;border-top:1px solid rgba(255,255,255,.08);
  font-size:10px;color:var(--bg-text-dim);text-align:center;letter-spacing:.3px}

/* ─── NAV GROUPS (renderNav z common.js) ─── */
#nav-links{display:flex;align-items:center;gap:0}
.nav-group{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 14px;gap:3px}
.nav-glbl{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--gold-lt);white-space:nowrap}
.nav-gdate{font-weight:500;color:#fbbf24;font-size:9px;letter-spacing:.3px}
.nav-glinks{display:flex;gap:2px;align-items:center;flex-wrap:wrap}
.nav-lnk{color:rgba(240,244,255,.85);text-decoration:none;font-size:11px;font-weight:500;
  padding:4px 9px;border-radius:6px;white-space:nowrap;transition:background .15s,color .15s;border:1px solid transparent}
.nav-lnk:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.12)}
.nav-lnk.active{background:rgba(212,149,42,.2);color:#fbbf24;font-weight:700;border-color:rgba(212,149,42,.35)}
.nav-divider{width:1px;align-self:stretch;
  background:linear-gradient(180deg,transparent 0%,rgba(212,149,42,.7) 20%,rgba(212,149,42,.9) 50%,rgba(212,149,42,.7) 80%,transparent 100%);
  margin:0 6px;flex-shrink:0;min-height:38px}

/* ─── LOADING / ERROR ─── */
#loading{text-align:center;padding:80px;color:var(--bg-text);font-size:14px}
#err{background:rgba(220,38,38,.10);border:1px solid rgba(220,38,38,.25);color:#fca5a5;border-radius:12px;padding:12px;margin:20px;display:none}

/* ─── STICKY TABS ─── */
.sticky-tabs{position:sticky;top:52px;z-index:100;display:flex;
  background:rgba(1,10,42,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.08)}
.sticky-tab{flex:1;padding:8px 20px;text-align:center;font-weight:600;font-size:10px;
  cursor:pointer;border:none;outline:none;transition:.2s;letter-spacing:.6px;color:var(--bg-text);background:none;text-transform:uppercase}
.sticky-tab.live{background:rgba(212,149,42,.12);border-bottom:2px solid var(--gold);color:#f59e0b}
.sticky-tab.hist{background:rgba(42,92,255,.12);border-bottom:2px solid var(--blue);color:#93c5fd}
.sticky-tab.inactive{opacity:.3;border-bottom-color:transparent;background:none}

/* ─── PROJEKCE ─── */
.proj-banner{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:13px 16px;margin-bottom:12px;box-shadow:var(--card-shadow)}
.proj-banner h3{font-size:11.5px;font-weight:700;color:var(--text-d);margin:0 0 8px}
.proj-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.proj-item{text-align:center}
.proj-item .pv{font-size:14px;font-weight:700;color:var(--text-d);font-variant-numeric:tabular-nums lining-nums}
.proj-item .pl{font-size:10px;color:var(--text-m)}
.section-sep{margin:22px 0;height:1px;background:linear-gradient(90deg,rgba(42,92,255,.5),rgba(212,149,42,.4))}

/* ─── CHARTS (hist) ─── */
.charts-3{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}

#mode-toggle{display:none}#mode-badge{display:none}

@media(max-width:1000px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:860px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-2col{grid-template-columns:1fr}.charts-3{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.charts-2col,.charts-3{grid-template-columns:1fr}.nav{grid-template-columns:1fr;gap:8px}.kpi-grid{grid-template-columns:repeat(2,1fr)}main{padding:0 14px 40px}.hero{flex-direction:column}.hero-kpi-row{display:none}}
</style>
</head>
<body>
<div class="bg-stage">
  <div class="bg-lines"></div>
  <div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div>
  <svg class="bg-waves" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="wg1" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(80,140,255,0)"/><stop offset="30%" stop-color="rgba(100,160,255,.5)"/>
        <stop offset="70%" stop-color="rgba(80,140,255,.5)"/><stop offset="100%" stop-color="rgba(80,140,255,0)"/>
      </linearGradient>
      <linearGradient id="wg2" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="rgba(60,110,230,0)"/><stop offset="40%" stop-color="rgba(80,130,240,.3)"/>
        <stop offset="60%" stop-color="rgba(60,110,230,.3)"/><stop offset="100%" stop-color="rgba(60,110,230,0)"/>
      </linearGradient>
      <filter id="wblur"><feGaussianBlur stdDeviation="6"/></filter>
    </defs>
    <g class="wave-g-1" filter="url(#wblur)">
      <path d="M -100 420 C 200 280,500 560,800 380 C 1100 200,1350 460,1600 320" fill="none" stroke="url(#wg1)" stroke-width="40" stroke-linecap="round" opacity=".65"/>
    </g>
    <g class="wave-g-1">
      <path d="M -100 420 C 200 280,500 560,800 380 C 1100 200,1350 460,1600 320" fill="none" stroke="rgba(150,190,255,.45)" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g class="wave-g-2" filter="url(#wblur)">
      <path d="M -100 580 C 250 440,550 660,900 500 C 1200 340,1450 580,1700 460" fill="none" stroke="url(#wg2)" stroke-width="24" stroke-linecap="round" opacity=".45"/>
    </g>
  </svg>
</div>

<div class="page">
<nav class="nav">
  <div class="nav-brand">
    <img src="../logo-light.svg" alt="22HLAV" style="height:40px;width:auto;display:block">
  </div>
  <div class="nav-center">
    <span class="nav-client-name" id="hdr-nazev">—</span>
    <span class="nav-sep">·</span>
    <span class="nav-period" id="hdr-period"></span>
    <span class="nav-sep">·</span>
    <span class="nav-ico-txt">IČO: <span id="hdr-ico">—</span></span>
  </div>
  <div class="nav-right" style="overflow:hidden"><span id="nav-links" style="display:flex;align-items:center;gap:0"></span></div>
  <span id="mode-badge" style="display:none"></span>
  <div id="mode-toggle" style="display:none"></div>
</nav>

<main>
  <div id="loading">Načítám data…</div>
  <div id="err"></div>

<script>
(function(){
  if(typeof window.getModeData!=="function"){
    window.getMode=function(){return location.hash.includes("rocni")?"rocni":"live";};
    window.getModeData=function(d){if(window.getMode()==="rocni"&&d.rocni&&Object.keys(d.rocni).length>0)return d.rocni;return d.aktualni;};
    window.getModeAllP=function(d){var mode=window.getMode();if(mode==="rocni"){var hist=(d.periody||[]).map(function(p){return Object.assign({},p,{label:"Rok "+(p.rok||""),period_label:"Rok "+(p.rok||"")});});var roc=(d.rocni&&Object.keys(d.rocni).length>0)?[Object.assign({},d.rocni,{label:"Rok "+(d.rocni.rok||""),period_label:"Rok "+(d.rocni.rok||"")})]:[]; return hist.concat(roc).filter(function(p){return p&&Object.keys(p).length>0;});}return[d.aktualni].filter(function(p){return p&&Object.keys(p).length>0;});};
    window.hasRocni=function(d){return!!(d&&d.rocni&&Object.keys(d.rocni).length>0);};
    window.kc=function(v,z){if(v===null||v===undefined)return z||"";return Math.round(v).toLocaleString("cs-CZ")+" Kč";};
    window.delta=function(a,b){if(!b||b===0)return null;return Math.round((a-b)/Math.abs(b)*1000)/10;};
  }
})();
</script>
