<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none">
  <!-- Icon: labyrinth square, light version for dark backgrounds -->
  <!-- Outer ring gold -->
  <rect x="3" y="3" width="54" height="54" rx="7" fill="rgba(212,149,42,0.25)" stroke="rgba(212,149,42,0.6)" stroke-width="1.5"/>
  <!-- Gold top-left accent -->
  <path d="M3 10 C3 6.134 6.134 3 10 3 L30 3 L30 11 L11 11 L11 30 L3 30 Z" fill="#D4952A"/>
  <!-- Inner white ring -->
  <rect x="11" y="11" width="38" height="38" rx="4" fill="rgba(255,255,255,0.12)"/>
  <!-- Inner content -->
  <rect x="15" y="15" width="30" height="30" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Gold small inner accent -->
  <path d="M15 20 C15 17.239 17.239 15 20 15 L28 15 L28 20 L20 20 L20 28 L15 28 Z" fill="#D4952A" opacity="0.9"/>
  <!-- Center -->
  <rect x="20" y="20" width="21" height="21" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="24" y="24" width="13" height="13" rx="2" fill="rgba(212,149,42,0.35)" stroke="#D4952A" stroke-width="1"/>

  <!-- Text: 22HLAV white -->
  <text x="70" y="41" font-family="'DM Sans','Segoe UI',Arial,sans-serif"
        font-size="24" font-weight="700" letter-spacing="1.5" fill="white">22HLAV</text>
  <text x="70" y="52" font-family="'DM Sans','Segoe UI',Arial,sans-serif"
        font-size="9" font-weight="400" letter-spacing="2" fill="rgba(160,185,255,0.7)">PRŮBĚŽNÉ VÝKAZNICTVÍ</text>
</svg>
