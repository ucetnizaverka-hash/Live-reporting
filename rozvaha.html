<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rozvaha | Průběžné výkaznictví</title>
<link rel="stylesheet" href="style.css">
<style>
  table { font-size: 12px; }
  th, td { padding: 3px 7px; }
  td.oz { width:5%; text-align:center; font-weight:600; color:var(--gold); }
  td.cr { width:4%; text-align:center; color:var(--text-dim); font-size:11px; }
  td.tx { }
  td.num { text-align:right; }
  tr.section-head td { background:rgba(0,0,0,.03) !important; font-weight:700; color:var(--gold); }
  tr.zero td.num { color:rgba(240,244,255,.25); }
  .tis-note { font-size:11px; color:var(--text-m); margin-bottom:6px; }
  /* Compact layout for výkazy pages */
  main { padding: 6px 12px 14px; }
  .section { padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; }
  .section h2 { font-size: 10px; margin-bottom: 7px; padding-bottom: 6px; }
  .header-top { padding: 5px 0 2px; }
  .nav-group { padding: 3px 16px 5px; gap: 3px; }
  .nav-lnk { padding: 3px 10px; font-size: 11px; }
  .nav-glbl { font-size: 8px; }
  .disclaimer { padding: 6px 12px; margin-bottom: 8px; font-size: 11px; }
  footer { padding: 8px; font-size: 11px; }
</style>
</head><body>
<header>
  <div class="header-top">
    <div class="logo">22<span>HLAV</span> &nbsp;|&nbsp; Rozvaha</div>
    <div class="header-meta" style="display:flex;align-items:center;gap:10px"><strong id="hdr-nazev">—</strong><span id="hdr-period"></span><span id="mode-badge"></span> · IČO: <span id="hdr-ico"></span></div>
  </div>
  <nav id="nav-links"></nav>
  <div id="mode-toggle"></div>
</header>
<main>
  <div id="loading">Načítám…</div><div id="err"></div>
  <div id="app" style="display:none">
    <div class="disclaimer" id="disclaimer" style="display:none"></div>
    <div class="section">
      <h2 id="aktiva-h2">Rozvaha — AKTIVA</h2>
      <p class="tis-note" id="aktiva-note">Hodnoty v Kč</p>
      <div style="overflow-x:auto"><table><thead id="akt-head"></thead><tbody id="akt-body"></tbody></table></div>
    </div>
    <div class="section" style="margin-top:20px">
      <h2>Rozvaha — PASIVA (dle vyhlášky 500/2002 Sb.)</h2>
      <p class="tis-note">Hodnoty v Kč · skutečnost běžného a minulého období</p>
      <div style="overflow-x:auto"><table><thead id="pas-head"></thead><tbody id="pas-body"></tbody></table></div>
    </div>
  </div>
</main>
<footer>Data jsou generována automatizovaným účetním procesem · 22HLAV · Průběžné výkaznictví v2.0</footer>
<script src="data/vsechna_obdobi_demo_sro.js"></script>
<script src="common.js"></script>
<script>
(function(){
  if(typeof window.getModeData!=="function"){
    window.getMode=function(){return location.hash.includes("rocni")?"rocni":"live";};
    window.getModeData=function(d){if(window.getMode()==="rocni"&&d.rocni&&Object.keys(d.rocni).length>0)return d.rocni;return d.aktualni;};
    window.getModeAllP=function(d){var mode=window.getMode();if(mode==="rocni"){var plny=function(p){return p&&(p.je_plny_rok===true||p.mesice===12||p.mesice_obdobi===12);};var hist=(d.periody||[]).filter(plny).map(function(p){return Object.assign({},p,{label:"Rok "+(p.rok||""),period_label:"Rok "+(p.rok||"")});});var roc=(d.rocni&&Object.keys(d.rocni).length>0)?[Object.assign({},d.rocni,{label:"Rok "+(d.rocni.rok||""),period_label:"Rok "+(d.rocni.rok||"")})]:[]; return hist.concat(roc).filter(function(p){return p&&Object.keys(p).length>0;});}return[d.aktualni].filter(function(p){return p&&Object.keys(p).length>0;});};
    window.hasRocni=function(d){return!!(d&&d.rocni&&Object.keys(d.rocni).length>0);};
    window.kc=function(v,z){if(v===null||v===undefined)return z||"";return Math.round(v).toLocaleString("cs-CZ")+" Kč";};
    window.delta=function(a,b){if(!b||b===0)return null;return Math.round((a-b)/Math.abs(b)*1000)/10;};
  }
})();
</script>
<script>
loadData(d => {
  const allP = getModeAllP(d);
  document.title = (d.nazev||"") + " | Rozvaha";
  const labels = allP.map(p => p.label || p.period_label);
  const n = allP.length;
  const showDelta = n >= 2;
  const a = getModeData(d);

  const v0 = (p, key) => (p[key] !== undefined && p[key] !== null) ? p[key] : 0;

  // V LIVE režimu = 1 období → Brutto/Korekce/Netto + minulé období dle vyhlášky 500/2002 Sb.
  // V ROCNI režimu = N období → jen Netto (pro srovnání mezi obdobími)
  const isLive = getMode() !== "rocni";
  const bknMode = isLive && n === 1;
  // Najdi minulé období (nejnovější plný rok z periody, nebo Rok 2023)
  const prevP = bknMode ? ((d.periody || []).find(x => x.rok === 2023)
                            || (d.periody || []).filter(p=>p.mesice===12||p.mesice_obdobi===12).slice(-1)[0]
                            || null) : null;
  const prevLabel = prevP ? (prevP.label || prevP.period_label || ("Rok " + (prevP.rok || ""))) : "Minulé období";

  let aktHead;
  if (bknMode) {
    aktHead = `<tr>
      <th class="oz" rowspan="2">Ozn.</th>
      <th style="text-align:left" rowspan="2">AKTIVA</th>
      <th class="cr" rowspan="2">Č.ř.</th>
      <th colspan="3" style="text-align:center">Běžné období · ${labels[0]||""}</th>
      <th rowspan="2" style="text-align:center">Minulé · ${prevLabel}<br><span style="font-weight:normal;font-size:10px">Netto</span></th>
    </tr>
    <tr>
      <th style="font-size:11px;text-align:center">Brutto</th>
      <th style="font-size:11px;text-align:center">Korekce</th>
      <th style="font-size:11px;text-align:center">Netto</th>
    </tr>
    <tr style="background:#f8f9fa"><td class="oz">a</td><td>b</td><td class="cr">c</td><th>1</th><th>2</th><th>3</th><th>4</th></tr>`;
  } else {
    aktHead = `<tr>
      <th class="oz" rowspan="2">Ozn.</th>
      <th style="text-align:left" rowspan="2">AKTIVA</th>
      <th class="cr" rowspan="2">Č.ř.</th>
      <th colspan="${n}" style="text-align:center">Netto</th>
      ${showDelta?'<th rowspan="2">Δ %</th>':''}
    </tr>
    <tr>${labels.map(l=>`<th style="font-size:11px;text-align:center">${l}</th>`).join('')}</tr>
    <tr style="background:#f8f9fa"><td class="oz">a</td><td>b</td><td class="cr">c</td>${labels.map((_,i)=>`<th>${i+1}</th>`).join('')}${showDelta?'<th></th>':''}</tr>`;
  }
  // Dynamicky nastavit nadpis + note podle režimu
  const _h2 = document.getElementById("aktiva-h2");
  const _note = document.getElementById("aktiva-note");
  if (bknMode && _h2) _h2.textContent = "Rozvaha — AKTIVA (plný rozsah dle § 4 vyhlášky 500/2002 Sb.)";
  else if (_h2) _h2.textContent = "Rozvaha — AKTIVA (netto pohled, srovnání období)";
  if (bknMode && _note) _note.innerHTML = "Hodnoty v Kč · <strong>Brutto / Korekce / Netto</strong> dle § 4 vyhlášky 500/2002 Sb.";
  else if (_note) _note.innerHTML = "Hodnoty v Kč · Zobrazujeme pouze sloupec <strong>Netto</strong> pro přehlednost meziročního srovnání. Plný rozsah (Brutto / Korekce / Netto) dle § 4 vyhlášky 500/2002 Sb. je k dispozici v <a href=\"index.html\" style=\"color:var(--gold)\">průběžném výkaznictví</a> nebo přímo v účetních knihách.";

  document.getElementById("akt-head").innerHTML = aktHead;

  const RA = (oz, txt, cr, key, {bold=false,sec=false,sub=false,sub2=false,note=false}={}) => {
    const vals = allP.map(p => v0(p, key));
    const last = vals[vals.length-1], prev = vals.length>=2?vals[vals.length-2]:null;
    const allZero = vals.every(v=>!v||v==0);
    const cls = sec?'section-head':bold?'bold':sub2?'sub2':sub?'sub':'';

    if (bknMode) {
      // LIVE: Brutto/Korekce/Netto z aktualni periody
      const p = allP[0];
      // Mapování netto klíče na brutto/korekce klíče
      const _bkmap = {
        "aktiva_netto": ["aktiva_brutto","aktiva_korekce"],
        "stala_netto":  ["stala_brutto","stala_korekce"],
        "dnm_netto":    ["dnm_brutto","dnm_korekce"],
        "dhm_netto":    ["dhm_brutto","dhm_korekce"],
        "dfm":          ["dfm_brutto","dfm_korekce"],
        "obezna_netto": ["obezna_brutto","obezna_korekce"],
        "zasoby":       ["zasoby_brutto","zasoby_korekce"],
        "pohledavky_kr":["pohledavky_brutto","pohledavky_korekce"],
        "kfm":          ["kfm_brutto","kfm_korekce"],
        "pp":           ["pp_brutto","pp_korekce"],
        "cr_aktiv":     ["cr_aktiv_brutto","cr_aktiv_korekce"],
      };
      const bk = _bkmap[key];
      const netto = v0(p, key);
      const brutto = bk && p[bk[0]] !== undefined && p[bk[0]] !== null ? p[bk[0]] : netto;
      const korekce = bk && p[bk[1]] !== undefined && p[bk[1]] !== null ? p[bk[1]] : 0;
      const allZeroBkn = !brutto && !korekce && !netto;
      const cls2 = sec?'section-head':bold?'bold':sub2?'sub2':sub?'sub':'';
      let row = `<tr class="${cls2}${(!sec&&!bold&&allZeroBkn)?' zero':''}">
        <td class="oz">${oz}</td><td class="tx">${note?`<em style="color:var(--text-dim)">${txt}</em>`:txt}</td>
        <td class="cr">${cr}</td>`;
      row += `<td class="num">${kc(brutto,'0 Kč')}</td>`;
      row += `<td class="num">${kc(korekce,'0 Kč')}</td>`;
      row += `<td class="num">${kc(netto,'0 Kč')}</td>`;
      // 4. sloupec — Netto minulého období
      const prevNetto = prevP ? v0(prevP, key) : null;
      row += `<td class="num" style="color:var(--text-m)">${prevNetto !== null ? kc(prevNetto,'0 Kč') : '—'}</td>`;
      return row+`</tr>`;
    }

    let row = `<tr class="${cls}${(!sec&&!bold&&allZero)?' zero':''}">
      <td class="oz">${oz}</td><td class="tx">${note?`<em style="color:var(--text-dim)">${txt}</em>`:txt}</td>
      <td class="cr">${cr}</td>`;
    vals.forEach(v => row += `<td class="num">${kc(v,'0 Kč')}</td>`);
    if(showDelta){const d2=delta(last,prev); row+=d2===null?`<td></td>`:`<td class="${d2>=0?'pos':'neg'}">${d2>=0?'':''} ${Math.abs(d2).toFixed(1)}%</td>`;}
    return row+`</tr>`;
  };
  const ASEP = () => `<tr class="sep"><td colspan="${3+n+(showDelta?1:0)}"></td></tr>`;
  const AHEAD = txt => `<tr class="section-head"><td class="oz"></td><td colspan="${2+n+(showDelta?1:0)}" style="padding:6px 8px">${txt}</td></tr>`;

  document.getElementById("akt-body").innerHTML = [
    RA("",      "AKTIVA CELKEM",                            "01","aktiva_netto",  {bold:true}),
    RA("A.",    "Pohledávky za upsaný základní kapitál",    "02","pohl_upsany_zk",{note:true}),
    RA("B.",    "Stálá aktiva",                             "03","stala_netto",   {bold:true}),
    RA("B.I.",  "Dlouhodobý nehmotný majetek",              "04","dnm_netto",     {sub:true}),
    RA("B.I.1.","  Nehmotné výsledky výzkumu a vývoje",     "05","dnm_vvv",       {sub:true,sub2:true,note:true}),
    RA("B.I.2.","  Ocenitelná práva",                       "06","dnm_prava",     {sub:true,sub2:true,note:true}),
    RA("B.I.3.","  Goodwill",                               "07","dnm_goodwill",  {sub:true,sub2:true,note:true}),
    RA("B.I.4.","  Ostatní dlouhodobý nehmotný majetek",    "08","dnm_ostatni",   {sub:true,sub2:true,note:true}),
    RA("B.I.5.","  Poskytnuté zálohy na DNM a nedokončený DNM","09","dnm_zalohy", {sub:true,sub2:true,note:true}),
    RA("B.II.", "Dlouhodobý hmotný majetek",                "10","dhm_netto",     {sub:true}),
    RA("B.II.1.","  Pozemky a stavby",                      "11","dhm_pozemky_stavby",{sub:true,sub2:true,note:true}),
    RA("B.II.2.","  Hmotné movité věci a jejich soubory",   "12","dhm_movite",    {sub:true,sub2:true}),
    RA("B.II.3.","  Oceňovací rozdíl k nabytému majetku",   "13","dhm_oc_rozdil", {sub:true,sub2:true,note:true}),
    RA("B.II.4.","  Ostatní dlouhodobý hmotný majetek",     "14","dhm_ostatni",   {sub:true,sub2:true,note:true}),
    RA("B.II.5.","  Poskytnuté zálohy na DHM a nedokončený DHM","15","dhm_zalohy",{sub:true,sub2:true,note:true}),
    RA("B.III.","Dlouhodobý finanční majetek",              "16","dfm",           {sub:true}),
    RA("B.III.1.","  Podíly – ovládaná nebo ovládající osoba","17","dfm_podily",  {sub:true,sub2:true,note:true}),
    RA("B.III.2.","  Zápůjčky a úvěry – ovládaná osoba",    "18","dfm_zapujcky",  {sub:true,sub2:true,note:true}),
    RA("B.III.3.","  Ostatní dlouhodobý finanční majetek",  "19","dfm_ostatni",   {sub:true,sub2:true,note:true}),
    RA("C.",    "Oběžná aktiva",                            "20","obezna_netto",  {bold:true}),
    RA("C.I.",  "Zásoby",                                   "21","zasoby",        {sub:true}),
    RA("C.I.1.","  Materiál",                               "22","zasoby_mat",    {sub:true,sub2:true,note:true}),
    RA("C.I.2.","  Nedokončená výroba a polotovary",        "23","zasoby_nv",     {sub:true,sub2:true,note:true}),
    RA("C.I.3.","  Výrobky a zboží",                        "24","zasoby_zbozi",  {sub:true,sub2:true}),
    RA("C.I.5.","  Poskytnuté zálohy na zásoby",            "25","zasoby_zalohy", {sub:true,sub2:true,note:true}),
    RA("C.II.", "Pohledávky",                               "26","pohledavky_kr", {sub:true}),
    RA("C.II.1.","  Dlouhodobé pohledávky",                 "27","pohledavky_dl", {sub:true,sub2:true,note:true}),
    RA("C.II.2.","  Krátkodobé pohledávky",                 "28","pohledavky_kr", {sub:true,sub2:true}),
    RA("C.III.","Krátkodobý finanční majetek",              "29","kfm",           {sub:true,note:true}),
    RA("C.IV.", "Peněžní prostředky",                       "30","pp",            {sub:true}),
    RA("C.IV.1.","  Peněžní prostředky v pokladně",         "31","pp_pokladna",   {sub:true,sub2:true}),
    RA("C.IV.2.","  Peněžní prostředky na účtech",          "32","pp_ucty",       {sub:true,sub2:true}),
    RA("D.",    "Časové rozlišení aktiv",                   "33","cr_aktiv"),
  ].join("");

  // PASIVA — v LIVE 2 sloupce (běžné + minulé), v ROCNI N období
  let pasHead;
  if (bknMode) {
    pasHead = `<tr>
      <th class="oz" rowspan="2">Ozn.</th>
      <th style="text-align:left" rowspan="2">PASIVA</th>
      <th class="cr" rowspan="2">Č.ř.</th>
      <th colspan="2" style="text-align:center">Skutečnost</th>
    </tr>
    <tr>
      <th style="font-size:11px;text-align:center">Běžné · ${labels[0]||""}</th>
      <th style="font-size:11px;text-align:center">Minulé · ${prevLabel}</th>
    </tr>
    <tr style="background:#f8f9fa"><td class="oz">a</td><td>b</td><td class="cr">c</td><th>1</th><th>2</th></tr>`;
  } else {
    pasHead = `<tr>
      <th class="oz" rowspan="2">Ozn.</th>
      <th style="text-align:left" rowspan="2">PASIVA</th>
      <th class="cr" rowspan="2">Č.ř.</th>
      <th colspan="${n}" style="text-align:center">Skutečnost</th>
      ${showDelta?'<th rowspan="2">Δ %</th>':''}
    </tr>
    <tr>${labels.map(l=>`<th style="font-size:11px;text-align:center">${l}</th>`).join('')}</tr>
    <tr style="background:#f8f9fa"><td class="oz">a</td><td>b</td><td class="cr">c</td>${labels.map((_,i)=>`<th>${i+1}</th>`).join('')}${showDelta?'<th></th>':''}</tr>`;
  }
  document.getElementById("pas-head").innerHTML = pasHead;

  // RP funkce — Pasiva (jen Netto, žádné B/K)
  const RP = (oz, txt, cr, key, {bold=false,sec=false,sub=false,sub2=false,note=false}={}) => {
    const cls = sec?'section-head':bold?'bold':sub2?'sub2':sub?'sub':'';
    if (bknMode) {
      const cur = v0(allP[0], key);
      const prev = prevP ? v0(prevP, key) : null;
      const allZero2 = !cur && !prev;
      let row = `<tr class="${cls}${(!sec&&!bold&&allZero2)?' zero':''}">
        <td class="oz">${oz}</td><td class="tx">${note?`<em style="color:var(--text-dim)">${txt}</em>`:txt}</td>
        <td class="cr">${cr}</td>`;
      row += `<td class="num">${kc(cur,'0 Kč')}</td>`;
      row += `<td class="num" style="color:var(--text-m)">${prev !== null ? kc(prev,'0 Kč') : '—'}</td>`;
      return row+`</tr>`;
    }
    // ROCNI/víceperiodový pohled — stejné jako RA bez B/K
    const vals = allP.map(p => v0(p, key));
    const last = vals[vals.length-1], prev = vals.length>=2?vals[vals.length-2]:null;
    const allZero = vals.every(v=>!v||v==0);
    let row = `<tr class="${cls}${(!sec&&!bold&&allZero)?' zero':''}">
      <td class="oz">${oz}</td><td class="tx">${note?`<em style="color:var(--text-dim)">${txt}</em>`:txt}</td>
      <td class="cr">${cr}</td>`;
    vals.forEach(v => row += `<td class="num">${kc(v,'0 Kč')}</td>`);
    if(showDelta){const d2=delta(last,prev); row+=d2===null?`<td></td>`:`<td class="${d2>=0?'pos':'neg'}">${d2>=0?'':''} ${Math.abs(d2).toFixed(1)}%</td>`;}
    return row+`</tr>`;
  };

  document.getElementById("pas-body").innerHTML = [
    RP("",      "PASIVA CELKEM",                           "01","pasiva_celkem", {bold:true}),
    RP("A.",    "Vlastní kapitál",                         "02","vk",            {bold:true}),
    RP("A.I.",  "Základní kapitál",                        "03","zk",            {sub:true}),
    RP("A.II.", "Ážio a kapitálové fondy",                 "04","kapitalove_fondy",{sub:true,note:true}),
    RP("A.III.","Fondy ze zisku",                          "05","fondy_ze_zisku",{sub:true,note:true}),
    RP("A.III.1.","  Ostatní rezervní fondy",              "06","rezervni_fond", {sub:true,sub2:true,note:true}),
    RP("A.IV.", "Výsledek hospodaření minulých let (+/-)", "07","vh_min_let",    {sub:true,negOk:true}),
    RP("A.IV.1.","  Nerozdělený zisk minulých let",        "08","nz_min_let",    {sub:true,sub2:true,note:true}),
    RP("A.IV.2.","  Neuhrazená ztráta minulých let (-)",   "09","ztrata_min_let",{sub:true,sub2:true,negOk:true,note:true}),
    RP("A.IV.3.","  Jiný výsledek hospodaření minulých let (+/-)","10","jiný_vh_min",{sub:true,sub2:true,note:true,negOk:true}),
    RP("A.V.",  "Výsledek hospodaření běžného účetního období (+/-)","11","vh_za_obdobi", {sub:true,negOk:true}),
    RP("A.VI.", "Rozhodnuto o zálohách na výplatu podílu na zisku (-)","12","zalohy_podil",{sub:true,note:true}),
    RP("B+C.",  "Cizí zdroje",                             "13","cizi_zdroje",   {bold:true}),
    RP("B.",    "Rezervy",                                 "14","rezervy",       {sub:true}),
    RP("B.1.",  "  Rezerva na důchody a podobné závazky",  "15","rez_duchody",   {sub:true,sub2:true,note:true}),
    RP("B.2.",  "  Rezerva na daň z příjmů",                "16","rez_dan",       {sub:true,sub2:true,note:true}),
    RP("B.3.",  "  Rezervy podle zvláštních právních předpisů","17","rez_zvl",   {sub:true,sub2:true,note:true}),
    RP("B.4.",  "  Ostatní rezervy",                        "18","rez_ostatni",  {sub:true,sub2:true,note:true}),
    RP("C.",    "Závazky",                                  "19","_zavazky_celkem",{sub:true,note:true}),
    RP("C.I.",  "Dlouhodobé závazky",                       "20","zavazky_dl",   {sub:true}),
    RP("C.I.1.","  Vydané dluhopisy",                       "21","zav_dl_dluh",  {sub:true,sub2:true,note:true}),
    RP("C.I.2.","  Závazky k úvěrovým institucím",          "22","zav_dl_uver",  {sub:true,sub2:true,note:true}),
    RP("C.I.3.","  Dlouhodobé přijaté zálohy",              "23","zav_dl_zalohy",{sub:true,sub2:true,note:true}),
