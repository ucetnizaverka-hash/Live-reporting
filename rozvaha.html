<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rozvaha | Živé výkaznictví</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header>
  <div class="header-top">
    <div class="logo">22<span>HLAV</span> &nbsp;|&nbsp; Rozvaha</div>
    <div class="header-meta"><strong id="hdr-nazev">—</strong><span id="hdr-period"></span> · IČO: <span id="hdr-ico"></span></div>
  </div>
  <nav id="nav-links"></nav>
</header>
<main>
  <div id="loading">⏳ Načítám…</div><div id="err"></div>
  <div id="app" style="display:none">
    <div class="disclaimer" id="disclaimer" style="display:none"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="section">
        <h2>Aktiva</h2>
        <table><thead id="akt-head"></thead><tbody id="akt-body"></tbody></table>
      </div>
      <div class="section">
        <h2>Pasiva</h2>
        <table><thead id="pas-head"></thead><tbody id="pas-body"></tbody></table>
      </div>
    </div>
    <div class="section" id="bilance-row" style="padding:12px 20px;font-size:13px"></div>
  </div>
</main>
<footer><span>22HLAV</span> · Živé výkaznictví v2.0</footer>
<script src="common.js"></script>
<script>
loadData(d => {
  const allP = [...(d.periody||[]), d.aktualni];
  document.title = (d.nazev||"")+" | Rozvaha";
  const labels = allP.map(p=>p.label||p.period_label);
  const showDelta = allP.length >= 2;
  const last = allP[allP.length-1], prev = allP[allP.length-2];

  const head = `<tr><th>Položka</th>${labels.map(l=>`<th>${l}</th>`).join("")}${showDelta?"<th>Δ %</th>":""}</tr>`;
  document.getElementById("akt-head").innerHTML = head;
  document.getElementById("pas-head").innerHTML = head;

  const R = (label,key,{bold=false,sub=false,sub2=false,sep=false}={}) => {
    if(sep) return `<tr class="sep"><td colspan="${allP.length+2}"></td></tr>`;
    const vals = allP.map(p=>kc(p[key]));
    const cls = bold?"bold":sub2?"sub2":sub?"sub":"";
    let row = `<tr class="${cls}"><td>${label}</td>${vals.map(v=>`<td>${v}</td>`).join("")}`;
    if(showDelta){
      const d2 = delta(last[key],prev[key]);
      row += d2===null?`<td></td>`:`<td class="${d2>=0?"pos":"neg"}">${d2>=0?"▲":"▼"} ${Math.abs(d2).toFixed(1)}%</td>`;
    }
    return row+`</tr>`;
  };

  document.getElementById("akt-body").innerHTML = [
    R("AKTIVA CELKEM",              "aktiva_netto",  {bold:true}),
    R("",null,{sep:true}),
    R("A. Pohledávky za upsaný ZK", "pohledavky_upsany_zk",{sub:true}),
    R("B. Stálá aktiva",            "stala_netto",   {sub:true,bold:false}),
    R("  B.I. DNM",                 "dnm_netto",     {sub2:true}),
    R("  B.II. DHM",                "dhm_netto",     {sub2:true}),
    R("  B.III. Dlouhodobý FM",     "dfm",           {sub2:true}),
    R("",null,{sep:true}),
    R("C. Oběžná aktiva",           "obezna_netto",  {sub:true}),
    R("  C.I. Zásoby",              "zasoby",        {sub2:true}),
    R("  C.II. Pohledávky",         "pohledavky_kr", {sub2:true}),
    R("  C.III. Krátk. FM",         "kfm",           {sub2:true}),
    R("  C.IV. Pen. prostředky",    "pp",            {sub2:true}),
    R("",null,{sep:true}),
    R("D. Časové rozlišení aktiv",  "cr_aktiv",      {sub:true}),
  ].join("");

  document.getElementById("pas-body").innerHTML = [
    R("PASIVA CELKEM",              "pasiva_celkem", {bold:true}),
    R("",null,{sep:true}),
    R("A. Vlastní kapitál",         "vk",            {sub:true}),
    R("  A.I. Základní kapitál",    "zk",            {sub2:true}),
    R("  A.III. Fondy ze zisku",    "fondy_ze_zisku",{sub2:true}),
    R("  A.IV. VH minulých let",    "vh_min_let",    {sub2:true}),
    R("  A.V. VH běžného období",   "vh_za_obdobi",  {sub2:true}),
    R("",null,{sep:true}),
    R("B.+C. Cizí zdroje",          "cizi_zdroje",   {sub:true}),
    R("  B. Rezervy",               "rezervy",       {sub2:true}),
    R("  C.I. Závazky dlouhodobé",  "zav_dl",        {sub2:true}),
    R("  C.II. Závazky krátkodobé", "zav_kr",        {sub2:true}),
    R("",null,{sep:true}),
    R("D. Časové rozlišení pasiv",  "cr_pasiv",      {sub:true}),
  ].join("");

  const bil = last.aktiva_netto === last.pasiva_celkem;
  document.getElementById("bilance-row").innerHTML =
    `Bilanční rovnost: <strong style="color:${bil?"var(--green)":"var(--red)"}">
    ${bil?"✓ OK":"✗ NEROVNOST "+kc(last.aktiva_netto - last.pasiva_celkem)}</strong>
    &nbsp;·&nbsp; Aktiva: <strong>${kc(last.aktiva_netto)}</strong>
    &nbsp;=&nbsp; Pasiva: <strong>${kc(last.pasiva_celkem)}</strong>`;
});
</script></body></html>
