<!DOCTYPE html><html lang="cs"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>VZZ | Průběžné výkaznictví</title>
<link rel="stylesheet" href="style.css">
<style>
  table { font-size: 12px; }
  th, td { padding: 3px 7px; }
  td.oz { width:5%; text-align:center; font-weight:600; color:var(--gold); }
  td.cr { width:4%; text-align:center; color:var(--text-dim); font-size:11px; }
  td.tx { width:40%; }
  td.vz { width:12%; font-size:10px; color:var(--text-dim); }
  td.num { text-align:right; }
  tr.section-head td { background:rgba(0,0,0,.03) !important; font-weight:700; color:var(--gold); font-size:12px; }
  tr.zero td.num { color:rgba(240,244,255,.25); }
  .tis-note { font-size:11px; color:var(--text-m); margin-bottom:6px; }
  /* Compact layout for výkazy pages */
  main { padding: 6px 12px 14px; }
  .section { padding: 12px 14px; margin-bottom: 8px; border-radius: 12px; }
  .section h2 { font-size: 10px; margin-bottom: 7px; padding-bottom: 6px; }
  .header-top { padding: 5px 0 2px; }
  .nav-group { padding: 3px 16px 5px; gap: 3px; }
  .nav-lnk { padding: 3px 10px; font-size: 11px; }
  .nav-glbl { font-size: 8px; }
  .disclaimer { padding: 6px 12px; margin-bottom: 8px; font-size: 11px; }
  footer { padding: 8px; font-size: 11px; }
</style>
</head><body>
<header>
  <div class="header-top">
    <div class="logo">22<span>HLAV</span> &nbsp;|&nbsp; Výkaz zisku a ztráty</div>
    <div class="header-meta" style="display:flex;align-items:center;gap:10px"><strong id="hdr-nazev">—</strong><span id="hdr-period"></span><span id="mode-badge"></span> · IČO: <span id="hdr-ico"></span></div>
  </div>
  <nav id="nav-links"></nav>
  <div id="mode-toggle"></div>
</header>
<main>
  <div id="loading">Načítám…</div><div id="err"></div>
  <div id="app" style="display:none">
    <div class="disclaimer" id="disclaimer" style="display:none"></div>
    <div class="section">
      <h2>Výkaz zisku a ztráty — druhové členění, plný rozsah</h2>
      <div style="overflow-x:auto">
        <table id="vzz-table"><thead id="vzz-head"></thead><tbody id="vzz-body"></tbody></table>
      </div>
    </div>
  </div>
</main>
<footer>Data jsou generována automatizovaným účetním procesem · 22HLAV · Průběžné výkaznictví v2.0</footer>
<script src="data/vsechna_obdobi_demo_sro.js"></script>
<script src="common.js"></script>
<script>
(function(){
  if(typeof window.getModeData!=="function"){
    window.getMode=function(){return location.hash.includes("rocni")?"rocni":"live";};
    window.getModeData=function(d){if(window.getMode()==="rocni"&&d.rocni&&Object.keys(d.rocni).length>0)return d.rocni;return d.aktualni;};
    window.getModeAllP=function(d){var mode=window.getMode();if(mode==="rocni"){var plny=function(p){return p&&(p.je_plny_rok===true||p.mesice===12||p.mesice_obdobi===12);};var hist=(d.periody||[]).filter(plny).map(function(p){return Object.assign({},p,{label:"Rok "+(p.rok||""),period_label:"Rok "+(p.rok||"")});});var roc=(d.rocni&&Object.keys(d.rocni).length>0)?[Object.assign({},d.rocni,{label:"Rok "+(d.rocni.rok||""),period_label:"Rok "+(d.rocni.rok||"")})]:[]; return hist.concat(roc).filter(function(p){return p&&Object.keys(p).length>0;});}return[d.aktualni].filter(function(p){return p&&Object.keys(p).length>0;});};
    window.hasRocni=function(d){return!!(d&&d.rocni&&Object.keys(d.rocni).length>0);};
    window.kc=function(v,z){if(v===null||v===undefined)return z||"";return Math.round(v).toLocaleString("cs-CZ")+" Kč";};
    window.delta=function(a,b){if(!b||b===0)return null;return Math.round((a-b)/Math.abs(b)*1000)/10;};
  }
})();
</script>
<script>
loadData(d => {
  const allP = getModeAllP(d);
  document.title = (d.nazev||"") + " | VZZ";
  const labels = allP.map(p => p.label || p.period_label);
  const n = allP.length;
  const showDelta = n >= 2;

  // Záhlaví tabulky
  document.getElementById("vzz-head").innerHTML = `
    <tr>
      <th class="oz" rowspan="2">Ozn.</th>
      <th style="text-align:left" rowspan="2">TEXT</th>
      <th class="vz" rowspan="2" style="text-align:center">Vzorec</th>
      <th class="cr" rowspan="2">Č.ř.</th>
      <th colspan="${n}" style="text-align:center"></th>
      ${showDelta ? '<th rowspan="2">Δ %</th>' : ''}
    </tr>
    <tr>${labels.map((l,i) => `<th style="font-size:11px;text-align:center">${l}</th>`).join('')}</tr>
    <tr style="background:#f8f9fa"><td class="oz">a</td><td>b</td><td></td><td class="cr">c</td>${labels.map((_,i)=>`<th>${i+1}</th>`).join('')}${showDelta?'<th></th>':''}</tr>`;

  const v0 = (p, key) => {
    if(p[key] !== undefined && p[key] !== null) return p[key];
    return 0;
  };

  // Řádek tabulky — pokud je note:true a všechny hodnoty 0, řádek se VYNECHÁ
  const R = (oz, txt, vz, cr, key, {bold=false, sec=false, note=false, sub=false, sub2=false, negOk=false}={}) => {
    const vals = allP.map(p => v0(p, key));
    const last = vals[vals.length-1];
    const prev = vals.length>=2 ? vals[vals.length-2] : null;
    const allZero = vals.every(v => !v || v==0);
    // Skryj note řádky bez dat — nezahlcujeme výkaz placeholdery
    if (note && allZero) return '';
    const cls = sec ? 'section-head' : bold ? 'bold' : sub2 ? 'sub2' : sub ? 'sub' : '';
    let row = `<tr class="${cls}">
      <td class="oz">${oz}</td>
      <td class="tx">${txt}</td>
      <td class="vz">${vz}</td>
      <td class="cr">${cr}</td>`;
    vals.forEach(v => {
      const neg = v < 0;
      row += `<td class="num${neg ? ' neg' : ''}">${v===0?'—':kc(v, '—')}</td>`;
    });
    if(showDelta) {
      const d2 = delta(last, prev);
      row += d2===null ? `<td></td>` : `<td class="${d2>=0?'pos':'neg'}">${d2>=0?'+':''}${d2.toFixed(1)}%</td>`;
    }
    return row + `</tr>`;
  };
  const SEP = () => `<tr class="sep"><td colspan="${4+n+(showDelta?1:0)}"></td></tr>`;
  const HEAD = (txt) => `<tr class="section-head"><td class="oz"></td><td colspan="${3+n+(showDelta?1:0)}" style="padding:6px 8px">${txt}</td></tr>`;

  document.getElementById("vzz-body").innerHTML = [
    R("I.",    "Tržby z prodeje výrobků a služeb",               "",                  "01", "trzby_sluzby"),
    R("II.",   "Tržby za prodej zboží",                          "",                  "02", "trzby_zbozi"),
    R("A.",    "Výkonová spotřeba",                              "(součet A.1 až A.3)","03", "vyk_spotreba",   {bold:true}),
    R("A.1.",  "  Náklady vynaložené na prodané zboží",          "",                  "04", "nak_zbozi",      {sub:true}),
    R("A.2.",  "  Spotřeba materiálu a energie",                 "",                  "05", "spotreba_mat_energie", {sub:true}),
    R("A.3.",  "  Služby",                                       "",                  "06", "sluzby",         {sub:true}),
    R("B.",    "Změna stavu zásob vlastní činnosti (+/-)",       "",                  "07", "zmena_zasoby_vc",{note:true}),
    R("C.",    "Aktivace (-)",                                   "",                  "08", "aktivace",       {note:true}),
    R("D.",    "Osobní náklady",                                 "(součet D.1 + D.2)","09", "osobni_naklady", {bold:true}),
    R("D.1.",  "  Mzdové náklady",                               "",                  "10", "mzdy",           {sub:true}),
    R("D.2.",  "  Náklady na SZ, ZP a ostatní náklady",          "",                  "11", "naklady_sp_zp",  {sub:true,note:true}),
    R("D.2.1.","    Náklady na SZ a ZP",                         "",                  "12", "naklady_sp_zp_jen", {sub:true,sub2:true,note:true}),
    R("D.2.2.","    Ostatní náklady",                            "",                  "13", "naklady_ostatni",{sub:true,sub2:true,note:true}),
    R("E.",    "Úpravy hodnot v provozní oblasti",               "(součet E.1 až E.3)","14", "odpisy",         {bold:true}),
    R("E.1.",  "  Úpravy hodnot dlouhodobého nehmotného a hmotného majetku", "(E.1.1 + E.1.2)", "15", "odpisy", {sub:true}),
    R("E.1.1.","    Úpravy hodnot DNM a DHM – trvalé",           "",                  "16", "odpisy",         {sub:true,sub2:true}),
    R("E.1.2.","    Úpravy hodnot DNM a DHM – dočasné",          "",                  "17", "op_dhm_docasne", {sub:true,sub2:true,note:true}),
    R("E.2.",  "  Úpravy hodnot zásob",                          "",                  "18", "op_zasoby",      {sub:true,note:true}),
    R("E.3.",  "  Úpravy hodnot pohledávek",                     "",                  "19", "op_pohledavky",  {sub:true,note:true}),
    R("III.",  "Ostatní provozní výnosy",                        "(III.1 + III.2 + III.3)","20", "ost_prov_vyn",  {bold:true}),
    R("III.1.","  Tržby z prodaného dlouhodobého majetku",       "",                  "21", "trzby_prodany_dm",  {sub:true}),
    R("III.2.","  Tržby z prodaného materiálu",                  "",                  "22", "trzby_prodany_mat", {sub:true,note:true}),
    R("III.3.","  Jiné provozní výnosy",                         "",                  "23", "jine_prov_vynosy",  {sub:true,note:true}),
    R("F.",    "Ostatní provozní náklady",                       "(součet F.1 až F.5)","24", "ost_prov_nak",   {bold:true}),
    R("F.1.",  "  Zůstatková cena prodaného DM",                 "",                  "25", "zc_dm",          {sub:true,note:true}),
    R("F.2.",  "  Prodaný materiál",                             "",                  "26", "zc_mat",         {sub:true,note:true}),
    R("F.3.",  "  Daně a poplatky",                              "",                  "27", "dane_poplatky",  {sub:true,note:true}),
    R("F.4.",  "  Rezervy v provozní oblasti a KNPO",            "",                  "28", "rezervy_prov",   {sub:true,note:true}),
    R("F.5.",  "  Jiné provozní náklady",                        "",                  "29", "jine_prov_nak",  {sub:true,note:true}),
    R("*",     "Provozní výsledek hospodaření (+/-)",            "",                  "30", "provozni_vh",    {bold:true,negOk:true}),
    SEP(),
    R("IV.",   "Výnosy z DFM – podíly",                          "(IV.1 + IV.2)",     "31", "vyn_dfm_podily", {bold:true,note:true}),
    R("IV.1.", "  Výnosy z podílů – ovládaná nebo ovládající osoba","",               "32", "vyn_podily_ov",  {sub:true,note:true}),
    R("IV.2.", "  Ostatní výnosy z podílů",                      "",                  "33", "vyn_podily_ost", {sub:true,note:true}),
    R("G.",    "Náklady vynaložené na prodané podíly",           "",                  "34", "nak_prodane_podily",{note:true}),
    R("V.",    "Výnosy z ostatního DFM",                         "(V.1 + V.2)",       "35", "vyn_dfm_ostatni",{bold:true,note:true}),
    R("V.1.",  "  Výnosy z ostatního DFM – ovládaná osoba",      "",                  "36", "vyn_dfm_ov",     {sub:true,note:true}),
    R("V.2.",  "  Ostatní výnosy z ostatního DFM",               "",                  "37", "vyn_dfm_ost",    {sub:true,note:true}),
    R("H.",    "Náklady související s ostatním DFM",             "",                  "38", "nak_jiny_dfm",   {note:true}),
    R("VI.",   "Výnosové úroky a podobné výnosy",                "(VI.1 + VI.2)",     "39", "vyn_uroky",      {bold:true}),
    R("VI.1.", "  Výnosové úroky – ovládaná nebo ovládající osoba","",                "40", "vyn_uroky_ov",   {sub:true,note:true}),
    R("VI.2.", "  Ostatní výnosové úroky a podobné výnosy",      "",                  "41", "vyn_uroky",      {sub:true}),
    R("I.",    "Úpravy hodnot a rezervy ve finanční oblasti",    "",                  "42", "up_hodnot_fin",  {note:true}),
    R("J.",    "Nákladové úroky a podobné náklady",              "(J.1 + J.2)",       "43", "nak_uroky",      {bold:true}),
    R("J.1.",  "  Nákladové úroky – ovládaná nebo ovládající osoba","",               "44", "nak_uroky_ov",   {sub:true,note:true}),
    R("J.2.",  "  Ostatní nákladové úroky a podobné náklady",    "",                  "45", "nak_uroky",      {sub:true}),
    R("VII.",  "Ostatní finanční výnosy",                        "",                  "46", "ost_fin_vyn"),
    R("K.",    "Ostatní finanční náklady",                       "",                  "47", "ost_fin_nak"),
    R("*",     "Finanční výsledek hospodaření (+/-)",            "",                  "48", "financni_vh",    {bold:true,negOk:true}),
    R("**",    "Výsledek hospodaření před zdaněním (+/-)",       "(součet * + *)",    "49", "vh_pred_zdanenim",{bold:true,negOk:true}),
    R("L.",    "Daň z příjmů",                                   "(L.1 + L.2)",       "50", "dan",            {bold:true}),
    R("L.1.",  "  Daň z příjmů splatná",                         "",                  "51", "dan",            {sub:true}),
    R("L.2.",  "  Daň z příjmů odložená",                         "",                  "52", "dan_odlozena",   {sub:true,note:true}),
    R("**",    "Výsledek hospodaření po zdanění (+/-)",           "",                  "53", "vh_za_obdobi",   {bold:true,negOk:true}),
    R("M.",    "Převod podílu na výsledku hospodaření společníkům (+/-)", "",         "54", "prevod_vh",      {note:true}),
    R("**",    "Výsledek hospodaření za účetní období (+/-)",     "(** − M.)",         "55", "vh_za_obdobi",   {bold:true,negOk:true}),
    R("*",     "Čistý obrat za účetní období",                    "= I.+II.+III.+IV.+V.+VI.+VII.", "56", "cisty_obrat", {bold:true}),
  ].join("");
});
</script>
</body></html>
